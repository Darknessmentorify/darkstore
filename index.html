<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARK STORE</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050510;
    color:white;
}

/* HEADER */
header{
    text-align:center;
    padding:20px;
    font-size:26px;
    color:#c77dff;
    text-shadow:0 0 20px #c77dff;
}

/* HERO */
.hero{
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    font-size:45px;
    background:linear-gradient(90deg,#c77dff,#00bfff);
    -webkit-background-clip:text;
    color:transparent;
    text-shadow:0 0 30px #c77dff;
}

/* PRODUCTOS */
.products{
    padding:20px;
    display:grid;
    gap:20px;
}

.card{
    background:#0a0a1a;
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 30px rgba(0,255,255,0.2);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.03);
    box-shadow:0 0 40px #00bfff;
}

/* PRECIOS */
.price-box{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.price{
    flex:1;
    padding:10px;
    text-align:center;
    background:#111;
    border-radius:10px;
    box-shadow:0 0 10px #00bfff;
}

/* BOTONES */
.btn{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

/* WHATSAPP */
.whatsapp{
    background:linear-gradient(90deg,#00ff88,#00cc66);
    box-shadow:0 0 25px #00ff88;
}

/* PAYPAL */
.paypal{
    background:linear-gradient(90deg,#0070ba,#00bfff);
    box-shadow:0 0 25px #00bfff;
}

/* EFECTO TOQUE */
.btn:active{
    transform:scale(0.9);
    box-shadow:0 0 40px white;
}

h2{
    color:#c77dff;
}
</style>
</head>

<body>

<header>DARK STORE</header>

<section class="hero">
<h1>DARK STORE</h1>
<p>Productos digitales premium para gamers</p>
</section>

<section class="products">

<!-- PRODUCTO 1 -->
<div class="card">
<h2>Fluorite iPhone</h2>

<div class="price-box">
<div class="price">1 día $5</div>
<div class="price">7 días $11</div>
<div class="price">30 días $20</div>
</div>

<button class="btn whatsapp" onclick="goWhatsApp()">Comprar por WhatsApp</button>
<button class="btn paypal" onclick="goPayPal()">Pagar con PayPal</button>
</div>

<!-- PRODUCTO 2 -->
<div class="card">
<h2>Drip Client Android</h2>

<div class="price-box">
<div class="price">$1</div>
<div class="price">$4</div>
<div class="price">$8</div>
<div class="price">$12</div>
</div>

<button class="btn whatsapp" onclick="goWhatsApp()">Comprar por WhatsApp</button>
<button class="btn paypal" onclick="goPayPal()">Pagar con PayPal</button>
</div>

<!-- PRODUCTO 3 -->
<div class="card">
<h2>BR Mod Android</h2>

<div class="price-box">
<div class="price">$1</div>
<div class="price">$4</div>
<div class="price">$8</div>
<div class="price">$12</div>
</div>

<button class="btn whatsapp" onclick="goWhatsApp()">Comprar por WhatsApp</button>
<button class="btn paypal" onclick="goPayPal()">Pagar con PayPal</button>
</div>

<!-- PRODUCTO 4 -->
<div class="card">
<h2>Diamantes Free Fire</h2>

<div class="price">$45 - 6160 diamantes</div>
<div class="price">$19 - 2398 diamantes</div>
<div class="price">$9 - 1160 diamantes</div>

<button class="btn whatsapp" onclick="goWhatsApp()">Verificar ID por WhatsApp</button>
</div>

</section>

<script>
function goWhatsApp(){
    window.open("https://wa.link/1vvkkg");
}

function goPayPal(){
    window.open("https://www.paypal.me/Herreraalcantara265");
}
</script>

</body>
</html>
