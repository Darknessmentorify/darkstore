<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARK STORE</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#fff;
    color:#111;
}

/* HEADER */
header {
    background:#000;
    color:white;
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
}

/* BANNER */
.banner {
    background: linear-gradient(135deg, #000, #0066ff);
    color:white;
    text-align:center;
    padding:60px 20px;
}

.banner h1 {
    font-size:32px;
}

/* PRODUCTOS */
.products {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:30px;
}

.card {
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover {
    transform:translateY(-8px);
}

.card img {
    width:100%;
    border-radius:10px;
}

.price {
    color:#0066ff;
    font-weight:bold;
    margin:10px 0;
}

/* BOTONES */
.btn {
    display:block;
    width:100%;
    margin:5px 0;
    padding:12px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.whatsapp {
    background:#25D366;
    color:white;
}

.paypal {
    background:#0070ba;
    color:white;
}

.btn:hover {
    transform:scale(1.05);
}

/* SECCIONES */
.section {
    padding:40px;
    text-align:center;
}

footer {
    background:#000;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<header>DARK STORE</header>

<section class="banner">
    <h1>Productos digitales premium</h1>
    <p>Compra fácil y segura</p>
</section>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Fluorite iPhone</h3>
<p class="price">$20</p>
<a href="https://wa.link/1vvkkg"><button class="btn whatsapp">Comprar por WhatsApp</button></a>
<a href="https://www.paypal.me/Herreraalcantara265"><button class="btn paypal">Pagar con PayPal</button></a>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>Drip Client Android</h3>
<p class="price">$12</p>
<a href="https://wa.link/1vvkkg"><button class="btn whatsapp">Comprar por WhatsApp</button></a>
<a href="https://www.paypal.me/Herreraalcantara265"><button class="btn paypal">Pagar con PayPal</button></a>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<h3>BR Mod Android</h3>
<p class="price">$12</p>
<a href="https://wa.link/1vvkkg"><button class="btn whatsapp">Comprar por WhatsApp</button></a>
<a href="https://www.paypal.me/Herreraalcantara265"><button class="btn paypal">Pagar con PayPal</button></a>
</div>

</section>

<section class="section">
<h2>Sobre Nosotros</h2>
<p>Somos una tienda digital confiable con productos premium.</p>
</section>

<section class="section">
<h2>Contacto</h2>
<p>Contáctanos por WhatsApp para comprar.</p>
</section>

<footer>
© DARK STORE 2026
</footer>

</body>
</html>
