<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DARK STORE</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#050510;
    color:white;
}

/* HEADER */
header{
    padding:20px;
    text-align:center;
    font-size:24px;
    color:#c77dff;
    text-shadow:0 0 15px #c77dff;
}

/* HERO */
.hero{
    text-align:center;
    padding:50px 20px;
}

.hero h1{
    font-size:40px;
    background:linear-gradient(90deg,#c77dff,#00bfff);
    -webkit-background-clip:text;
    color:transparent;
    text-shadow:0 0 25px #c77dff;
}

/* PRODUCTOS */
.products{
    padding:20px;
    display:grid;
    gap:20px;
}

.card{
    background:#0a0a1a;
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 20px rgba(0,255,255,0.2);
    transition:0.3s;
}

.card:hover{
    transform:scale(1.02);
}

/* PRECIOS */
.price-box{
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

.price{
    background:#111;
    padding:10px;
    border-radius:10px;
    text-align:center;
    flex:1;
    margin:5px;
    box-shadow:0 0 10px #00bfff;
}

/* BOTONES */
.btn{
    display:block;
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.2s;
}

/* EFECTO GLOW */
.whatsapp{
    background:linear-gradient(90deg,#00ff88,#00cc66);
    box-shadow:0 0 20px #00ff88;
}

.paypal{
    background:linear-gradient(90deg,#0070ba,#00bfff);
    box-shadow:0 0 20px #00bfff;
}

/* EFECTO TOQUE */
.btn:active{
    transform:scale(0.92);
    box-shadow:0 0 30px white;
}

/* TEXTO */
h2{
    color:#c77dff;
}
</style>
</head>

<body>

<header>DARK STORE</header>

<section class="hero">
<h1>DARK STORE</h1>
<p>Productos digitales premium para gamers</p>
</section>

<section class="products">

<div class="card">
<h2>Fluorite iPhone</h2>

<div class="price-box">
<div class="price">1 día<br>$5</div>
<div class="price">7 días<br>$11</div>
<div class="price">30 días<br>$20</div>
</div>

<a href="https://wa.link/1vvkkg">
<button class="btn whatsapp">Comprar por WhatsApp</button>
</a>

<a href="https://www.paypal.me/Herreraalcantara265">
<button class="btn paypal">Pagar con PayPal</button>
</a>

</div>

<div class="card">
<h2>Drip Client Android</h2>

<div class="price-box">
<div class="price">$1</div>
<div class="price">$4</div>
<div class="price">$8</div>
<div class="price">$12</div>
</div>

<a href="https://wa.link/1vvkkg">
<button class="btn whatsapp">Comprar por WhatsApp</button>
</a>

<a href="https://www.paypal.me/Herreraalcantara265">
<button class="btn paypal">Pagar con PayPal</button>
</a>

</div>

<div class="card">
<h2>Diamantes Free Fire</h2>

<div class="price">$45 - 6160 diamantes</div>
<div class="price">$19 - 2398 diamantes</div>
<div class="price">$9 - 1160 diamantes</div>

<a href="https://wa.link/1vvkkg">
<button class="btn whatsapp">Verificar ID por WhatsApp</button>
</a>

</div>

</section>

</body>
</html>
